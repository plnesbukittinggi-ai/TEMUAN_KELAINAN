  <script>
    // Dynamically convert Google Drive view links to direct image links so the browser can render them as icons
    (function() {
      const getDirectUrl = (url) => {
        if (url && url.includes('drive.google.com/file/d/')) {
          const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
          if (match && match[1]) {
            return `https://lh3.googleusercontent.com/d/${match[1]}`;
          }
        }
        return url;
      };
      
      document.querySelectorAll('link[rel*="icon"], link[rel="apple-touch-icon"]').forEach(link => {
        const originalHref = link.getAttribute('href');
        const directHref = getDirectUrl(originalHref);
        if (originalHref !== directHref) {
          link.setAttribute('href', directHref);
        }
      });
    })();

    // Register Service Worker for PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered with scope:', reg.scope))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
